services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sprouts}
      POSTGRES_USER: ${POSTGRES_USER:-sprouts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sprouts_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - sprouts_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sprouts} -d ${POSTGRES_DB:-sprouts}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sprouts_postgres_data:
